# Test Configuration
spring.application.name=CommunitySupportSystemTest

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate for Testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable email for testing
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# JWT Configuration (must be 32+ bytes)
jwt.secret=testSecretKeyForCommunitySupportSystemTesting2026
jwt.expiration=86400000

# SendGrid — disabled in tests
sendgrid.enabled=false
sendgrid.api.key=dummy-key
sendgrid.from.email=test@example.com
sendgrid.from.name=Test

# Data init — tests manage their own data
app.data.initialize=false

# Frontend URL (not used in tests)
frontend.url=http://localhost:3000

# CORS
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.om.community.supportsystem=WARN
logging.level.org.springframework.web=WARN